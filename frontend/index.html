<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Search Utah golf tee times across ForeUp, Chronogolf, and MemberSports. Compare open slots and book on the course site." />
    <meta name="theme-color" content="#1E4D3B" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="tee-time.io" />
    <meta property="og:url" content="https://tee-time.io/app/" />
    <meta property="og:title" content="tee-time.io · Every tee time. One search." />
    <meta property="og:description" content="Live tee times across Utah golf courses in one search. Compare times and prices, plan a round with your group, and get alerted when a slot opens." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="tee-time.io · Every tee time. One search." />
    <meta name="twitter:description" content="Live tee times across Utah golf courses in one search. Plan with your group and get alerted when slots open." />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('tt-theme');
          var preference = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
          var dark = preference === 'dark' || (preference === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var theme = dark ? 'dark' : 'light';
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', dark ? '#0F1713' : '#1E4D3B');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>Tee-Time</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
