name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Lint, build React app, and assemble Pages bundle
        run: bash scripts/build-pages.sh
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy deploy --project-name utah-tee-times
      # Preflight: Pages-only API tokens return 403 here — Workers deploy will fail the same way.
      - name: Verify Cloudflare token can manage Workers
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/cf_workers.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts")
          echo "GET .../workers/scripts -> HTTP $code"
          head -c 800 /tmp/cf_workers.json || true
          echo
          if [ "$code" != "200" ]; then
            echo "::error::API token cannot list Workers scripts (HTTP $code). Create a token with Account → Workers Scripts → Edit (and keep Pages → Edit if you use one token for both)."
            exit 1
          fi
      # Same action as Pages. Deploy from repo root with --config.
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config worker/wrangler.toml
